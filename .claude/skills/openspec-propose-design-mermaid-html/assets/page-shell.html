<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- [CHANGE_NAME] --></title>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: true, theme: 'default', securityLevel: 'loose' });
</script>
<style>
/* ── Design tokens ── */
:root {
  --red: #dc3545; --red-bg: #fff1f1; --red-bd: #f8c4c7;
  --green: #16a34a; --green-bg: #f0fdf4; --green-bd: #a3d9b5;
  --blue: #2563eb; --blue-bg: #eff6ff; --blue-bd: #bfdbfe;
  --yellow: #d97706; --yellow-bg: #fffbeb; --yellow-bd: #fde68a;
  --gray: #6b7280; --gray-bg: #f9fafb; --gray-bd: #e5e7eb;
  --text: #111827; --muted: #6b7280; --border: #e5e7eb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f1f5f9; color: var(--text); font: 13px/1.6 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ── Header ── */
.hdr { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); color: #fff; padding: 22px 32px; }
.hdr h1 { font-size: 20px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 4px; }
.hdr .sub { color: rgba(255,255,255,.55); font-size: 12px; }
.hdr .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.chip { padding: 2px 9px; border-radius: 4px; font-size: 11px; font-weight: 600;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.85); }

/* ── Layout ── */
.wrap { max-width: 1320px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 22px; }
.sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

/* ── Grid helpers ── */
.grid-2   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3   { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }

/* ── Card ── */
.card { background: #fff; border-radius: 10px; border: 1px solid var(--border);
  padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.card-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; }

/* ── Compare panels (Before / After) ── */
.cmp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cmp-panel { border-radius: 10px; border: 2px solid; overflow: hidden; background: #fff; }
.cmp-panel.before { border-color: var(--red); }
.cmp-panel.after  { border-color: var(--green); }
.cmp-hdr { padding: 9px 14px; font-weight: 700; font-size: 12px; }
.before .cmp-hdr { background: var(--red-bg);   color: #7f1d1d; }
.after  .cmp-hdr { background: var(--green-bg); color: #14532d; }
.cmp-body { padding: 12px; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.b-red    { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red-bd); }
.b-green  { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green-bd); }
.b-blue   { background: var(--blue-bg);   color: var(--blue);   border: 1px solid var(--blue-bd); }
.b-yellow { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-bd); }
.b-gray   { background: var(--gray-bg);   color: var(--gray);   border: 1px solid var(--gray-bd); }

/* ── Inline code ── */
code { font: 11px/1 'SFMono-Regular', Consolas, monospace;
  background: #f3f4f6; padding: 1px 5px; border-radius: 3px; color: #be123c; }

/* ── Goal / Non-goal lists ── */
.goal-list, .ng-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.goal-item, .ng-item { display: flex; gap: 8px; padding: 7px 10px; border-radius: 6px; font-size: 12px; align-items: flex-start; }
.goal-item { background: var(--green-bg); border: 1px solid var(--green-bd); color: #14532d; }
.goal-item::before { content: '✓'; font-weight: 700; flex-shrink: 0; color: var(--green); }
.ng-item   { background: var(--gray-bg);  border: 1px solid var(--gray-bd);  color: var(--muted); }
.ng-item::before   { content: '✗'; font-weight: 700; flex-shrink: 0; }

/* ── Decision / Risk items ── */
.dec-item  { padding: 11px 13px; border-radius: 7px; background: var(--blue-bg);   border: 1px solid var(--blue-bd);   margin-bottom: 10px; }
.risk-item { padding: 11px 13px; border-radius: 7px; background: var(--yellow-bg); border: 1px solid var(--yellow-bd); margin-bottom: 10px; }
.dec-title  { font-weight: 700; font-size: 12px; color: #1d4ed8; margin-bottom: 5px; }
.risk-title { font-weight: 700; font-size: 12px; color: #92400e; margin-bottom: 5px; }
.item-body  { font-size: 12px; color: #374151; }
.alt { margin-top: 7px; font-size: 11px; color: var(--muted); padding: 5px 8px; background: #fff; border-radius: 4px; border-left: 3px solid var(--gray-bd); }
.mitigation { margin-top: 7px; font-size: 11px; color: var(--green); padding: 5px 8px; background: var(--green-bg); border-radius: 4px; }

/* ── Table ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { background: #f8fafc; padding: 8px 12px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px; color: var(--muted); border-bottom: 2px solid var(--border); text-align: left; }
.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--gray-bg); }

/* ── Entry card snippets / notes ── */
.snippet { margin-top: 6px; padding: 6px 8px; background: #f8fafc; border-radius: 5px;
  font: 11px/1.5 'SFMono-Regular', Consolas, monospace; color: #374151;
  border-left: 3px solid var(--gray-bd); }
.snippet.hot { border-left-color: var(--yellow); background: var(--yellow-bg); }
.entry-note { margin-top: 6px; font-size: 11px; color: var(--muted); }

/* ── Mermaid ── */
.mermaid { text-align: center; }
.mermaid svg { max-width: 100%; }

/* ── Footer ── */
.footer { text-align: center; padding: 12px 0 8px; font-size: 11px; color: var(--muted); }
</style>
</head>
